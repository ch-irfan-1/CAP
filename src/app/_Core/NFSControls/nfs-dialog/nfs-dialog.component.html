<h2 #heading mat-dialog-title>{{data.title}}</h2>
<mat-dialog-content class="mat-typography">
  <h3>{{data.Description}}</h3>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close (click)="onClick(1)">
    {{data.leftBtnTxt}}
  </button>
  @if (!data.showSingleButton) {
    <button mat-button mat-dialog-close (click)="onClick(2)" cdkFocusInitial>
      {{data.rightBtnTxt}}
    </button>
  }
</mat-dialog-actions>
