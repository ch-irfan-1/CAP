<div class="documentsPage TabInnerMain">
  <div class="commonForm" [formGroup]="DocumentForm">
    <div>
      <div class="row">
        <div class="col-md-12 createLeadHeading topMargin30">
          <p>Please fill in your Information</p>
        </div>
      </div>
      <div class="row">
        <div class="col-md-12">
          <div class="row fieldContainer documentForm">
            <div class="col-md-2 top15">

                formControlName="DOCUMENTCDE" [Ismultiselect]="false" [EnableFilter]="true"

              <!-- File Upload -->
              <div class="uploadDivContainer" appDragDrop (fileDropped)="onFileDropped($event)">
                <input type="file" #fileDropRef id="fileDropRef" accept="{{accept}}"
                  (change)="fileBrowseHandler($event)" />
                <p><img src="assets/Images/uploadGray.png"> Drop File to upload or
                  <span>browse</span>
                </p>
              </div>
              <!-- End File Upload -->
            </div>

<div class="uploadDocumentContainer">
  <div class="row">
    <div class="col-md-12 topMargin15">
      <div class="row fieldContainer leftPadding15px">
        <div class="col-md-12 documentGrigHeader">
          <div class="documentNamHeading">
            <p>Name</p>
          </div>
          <div class="documentTypeHeading">
            <p>Type</p>
          </div>
          <div class="documentSizeHeading">
            <p>Size</p>
          </div>
          <div class="documentIconsHeading">
            <p>Actions</p>
          </div>
        </div>
        @for (file of files; track file; let i = $index) {
          <div class="col-md-12 UploadedDocumentsArray">
            <div class="documentName">
              <img src="assets/Images/file.png">
              <span>{{ file?.name }}</span>
            </div>
            <div class="documentTypeDesc">
              <span>{{ file?.documenttypdsc }}</span>
            </div>
            <div class="documentSize">
              <span>{{ formatBytes(file?.size, 2) }}</span>
            </div>
            <div class="documentIcons">
              <ng-container matColumnDef="viewDocument">
                <button mat-button (click)="viewDocument(file)">
                  <i class="material-icons">
                    remove_red_eye
                  </i>
                </button>
              </ng-container>
              <ng-container matColumnDef="downloadDocument">
                <button mat-button (click)="downloadDocument(file)">
                  <i class="material-icons">
                    file_download
                  </i>
                </button>
              </ng-container>
              <ng-container matColumnDef="downloadDocument">
                @if (this.Mode!='View') {
                  <button mat-button (click)="deleteFile(file, i)">
                    <i class="material-icons">
                      delete
                    </i>
                  </button>
                }
              </ng-container>
            </div>
            <mat-progress-bar mode="determinate" value="100"></mat-progress-bar>
          </div>
        }
      </div>
    </div>
  </div>
</div>

</div>

</div>
