<!-- NEW design hanges -->

<div class="FormMain capDocuments">
  @if (showDocument) {
    <div class="row">
      <div class="col-md-12 noPadding">
        <span class="mainHeading">
          <p>Document Details</p>
        </span>
      </div>
      <div class="col-md-12 noPadding">
        <div class="TabInnerMainForm">
          <div class="row tableMain rentalDetail">
            <div class="col-md-12">
              <nfs-static-grid [inputArr]="doctDataset" [isRadioBtnRequired]="false" [contextMenu]="ContextMenu"
                [ActionLabel]="'View'" [IsDeleteRequired]="false" [columns]="columns"
              (SelectionChange)="DocumentView()" [Labels]="Labels"></nfs-static-grid>
            </div>
            <div class="col-md-12 noPadding">
              <mat-paginator [selectConfig]="paginatorSelectConfig" [length]="dataSourcelength" [pageSize]="selectedPageSize"
                [pageSizeOptions]="pageSizeOptions" (page)="PageSelectionChanged($event)">
              </mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  }

  @if (!showDocument) {
    <div class="row">
      <div class="col-md-12 noPadding">
        <span class="mainHeading">
          <p class="backImage" (click)="DocumentView()"><img src="assets/Images/arrowBack.png"></p>
          <p>Default Documents</p>
        </span>
      </div>
      <div class="row col-md-12 noPadding DocumentExpansionPanel">
        <div class="col-md-12 noPadding docView">
          <img [style.transform]="'scale('+scale+')'" height="100px" width="100px"
                        src="assets/Images/demo.jpg" alt="Image Source" style=" display: block;
                        margin-left: auto;
                        margin-right: auto;
                        width: 50%;transform-origin: left top 32px;">
        </div>
        <div class="row col-md-12 imageControl">
          <div class="col-md-4 imgCntrlInner noPadding">
            <img src="assets/Images/previousDoc.png"  matTooltip="previous">
            <p>1 of 1</p>
            <img src="assets/Images/nextDoc.png"  matTooltip="Next">
          </div>
          <div class="col-md-5 zoomControls imgCntrlInner noPadding">
            <img src="assets/Images/zoomOut.png" (click)="zoomOutImg(scale)" >
            <p>{{scale}}</p>
            <img src="assets/Images/zoomIn.png" (click)="scale=scale+ .1" >
          </div>
          <div class="col-md-3 imgCntrlInner noPadding">
            <img src="assets/Images/strechDoc.png" class="strechDocIcon" (click)="openFullImage()">
            <img src="assets/Images/downloadWhite.png" class="downloadDocIcon">
          </div>
        </div>
      </div>
    </div>
  }
</div>
<!-- End NEW design hanges -->
</div>
