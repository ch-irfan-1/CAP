<ng-container>
  <div class="main-content">
    <div class="mainContainer">
      <form [formGroup]="QueueSearchForm">
        <div class="workQueueTopMain row">
          <div class="col-md-6">
            <h4>Total Leads {{totalRows}}</h4>
          </div>
        </div>
        <div class="workQueueSearchMain row fieldContainer">
          <h5>Search Criteria</h5>
          <div class="col-md-2 top15 searchField" style="height: 40px;">
            <nfs-dropdown formControlName="SearchByColumn" [Label]="'Filter'"
              (selectionChange)="changeColumnSelection()" [Ismultiselect]="false" [EnableFilter]="true"
              [FilterControlPlaceholder]="'Find Some Values...'"
              [noSearchEntriesFoundLabel]="'No Matching Values'" [DataArray]="this.workQueueColumnData">
            </nfs-dropdown>
          </div>
          <div class="col-md-2 top15" style="height: 40px;">
            <nfs-textbox name="SEARCHTXT" maxlength="100" [Placeholder]="'Search Text'"
              formControlName="SearchText" [Label]="'Search Text'" [Name]="'SEARCHTXT'"
              (InputText)='applyFilter()'>
            </nfs-textbox>
          </div>
          <div class="col-md-2 top15" style="height: 40px;">
            <nfs-datepicker matInput  formControlName="FromDate" name="FROMDTE"
              [Max]="QueueSearchForm.controls.ToDate.value" [Placeholder]="'From Date'"
              [Label]="'From Date'">
            </nfs-datepicker>
          </div>
          <div class="col-md-2 top15" style="height: 40px;">
            <nfs-datepicker matInput  formControlName="ToDate" name="TODTE" [Max]="this.maxDate"
              [Min]="QueueSearchForm.controls.FromDate.value" [Placeholder]="'To Date'"
              [Label]="'To Date'">
            </nfs-datepicker>
          </div>
          <div class="col-md-4 top15" style="height: 40px;" [formGroup]='RadioOptions'>
            @if (this.IsAPCuserLoggedin) {
              <mat-radio-group aria-label="Select Status"
                formControlName="Option">
                <mat-radio-button [checked]='true' value="All" (change)="applyFilterCustom('00000')"
                  style="width: 88px;">All
                </mat-radio-button>
                <mat-radio-button value="New" (change)="applyFilterCustom('00002')" style="width: 100px;">
                  New
                </mat-radio-button>
                <mat-radio-button value="Cancelled" (change)="applyFilterCustom('00033')"
                  style="width: 136px;">Cancelled
                </mat-radio-button>
                <mat-radio-button value="Assigned" (change)="applyFilterCustom('00144')">Assigned
                </mat-radio-button>
              </mat-radio-group>
            }
          </div>
          <div class="col-md-12 row justify-content-end" style="margin-top: 15px !important;">
            <nfs-button [text]="'Search'" [color]="'primary'" [disabled]="false" [matButton]="false"
              [matRaisedButton]="false" [matRaisedButtonIcon]="true"
              [iconPng]="'assets/Images/searchwhite.png'" (onBtnClick)="btnSearch()" style="margin-right: 15px;">
            </nfs-button>
            <nfs-button [text]="'Reset Grid'" [color]="'primary'" [disabled]="false" [matButton]="false"
              [matRaisedButton]="false" [matRaisedButtonIcon]="true" [iconPng]="'assets/Images/reset.png'"
              (onBtnClick)="btnReset()">
            </nfs-button>
          </div>
        </div>

<nfs-static-grid [inputArr]="workQueueDataset" [isRadioBtnRequired]="false" [columns]="columns"
  [pipes]="pipes" [contextMenu]="ContextMenu" (SelectionChange)="workQueueOutput($event)"
  [isWorkQueue]="true" [WorkQueueSrc]="'IOPS'" [Labels]="Labels" [DisableSorting]="false" [rightClickContextMenuEnable]=true
  [IsActionRequired]=false>
</nfs-static-grid>

<mat-paginator [selectConfig]="paginatorSelectConfig" [length]="dataSourcelength" [pageSize]="selectedPageSize" [ngClass]="'work-queue-paginator'"
  [pageSizeOptions]="pageSizeOptions" (page)="PageSelectionChanged($event)">
</mat-paginator>
