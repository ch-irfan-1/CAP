<div class="loginMain">
    <div class="row popupHeader">
            <div class="col-md-11">
                <span class="popupMainHeading">File Comment</span>
            </div>
            <div class="col-md-1">
                <button mat-icon-button class="close-button">
                    <mat-icon class="close-icon" color="warn" (click)="cancel()">close</mat-icon>
                </button>
            </div>
        </div>
    <div class="popupBody">
        <div class="bodyContainer FormMain customAccordianMain">
            <div class="row interestFieldAdjustBox fieldContainer" [formGroup]="DocumentComment">
                <div class="col-md-12 top15">
                    <nfs-textarea class="customLengthUpload" [maxLength]="500" [Placeholder]="'Comment'" [Label]="'Comment'"
                        formControlName="DOCUMENTCOMMENT">
                    </nfs-textarea>
                </div>
                <div class="col-md-12 searchBtns" style="margin-top: 12px !important;">
                    <nfs-button [text]="'OK'" [color]="'primary'" [disabled]="false" [matButton]="false"
                        [matRaisedButton]="false" [matRaisedButtonIcon]="true" (onBtnClick)="okClick()">
                    </nfs-button>
                </div>
            </div>
        </div>
    </div>
</div>
