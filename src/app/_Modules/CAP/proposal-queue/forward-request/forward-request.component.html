<div class="row popupHeader">
    <div class="col-md-11">
        <span class="popupMainHeading">Forward Request</span>
    </div>
    <div class="col-md-1">
        <button mat-icon-button class="close-button" (click)="btnCancel_Click()">
            <mat-icon class="close-icon" color="warn">close</mat-icon>
        </button>
    </div>
</div>
<div class="popupBody">
    <div class="bodyContainer FormMain">
        <div class="row interestFieldAdjustBox fieldContainer" [formGroup]="ForwardRequestForm">
            <div class="col-md-3 marginTopMinus">
                <nfs-dropdown [Label]="'User Name'"  [Ismultiselect]="false"
                    [EnableFilter]="true" [AllowUnSelect]="true"
                    [FilterControlPlaceholder]="'Find Some Values...'"
                    [noSearchEntriesFoundLabel]="'No Matching Values'" formControlName="User" [Name]="'USERID'"
                    [DataArray]="this.userArray" >
                </nfs-dropdown>
            </div>
            <div class="col-md-12 top15 marginTop40">
                <nfs-textarea [maxLength]="1000" [Placeholder]="'Comments'" [Label]="'Comments'"
                formControlName="COMMENTS">
                </nfs-textarea>
            </div>
            <div class="col-md-12 searchBtns marginTop15">
                                        
                <nfs-button [text]="'Close'" [color]="'primary'" [disabled]="false" [matButton]="false"
                    [matRaisedButton]="false" [matRaisedButtonIcon]="true" (onBtnClick)="btnCancel_Click()">
                </nfs-button>
                <nfs-button [text]="'Submit'" [color]="'primary'" [disabled]="false" [matButton]="false"
                    [matRaisedButton]="false" [matRaisedButtonIcon]="true" (onBtnClick)="btnSubmit_Click()">
                </nfs-button>
            </div>
        </div>
    </div>
</div>
