<div class="row popupHeader">
    <div class="col-md-11">
        <span class="popupMainHeading">{{this.title}}</span>
    </div>
    <div class="col-md-1">
        <button mat-icon-button class="close-button" (click)="btnCancel_Click()">
            <mat-icon class="close-icon" color="warn">close</mat-icon>
        </button>
    </div>
</div>
<div class="popupBody">
    <div class="bodyContainer FormMain customAccordianMain">
        <div class="row interestFieldAdjustBox fieldContainer" [formGroup]="DeclineRequestForm">
            <div class="col-md-3 top10 customTopNegatiiveArea overrideWrapper">
                <nfs-dropdown [Label]="this.dropdownLable"  [Ismultiselect]="false"
                    [EnableFilter]="true" [AllowUnSelect]="false"
                    [FilterControlPlaceholder]="'Find Some Values...'"
                    [noSearchEntriesFoundLabel]="'No Matching Values'" formControlName="REASONCODE" [Name]="'USERID'"
                    [DataArray]="this.rejectionReasonArray" [isControlDisable]="this.readOnly">
                </nfs-dropdown>
                <nfs-checkbox class="example-margin" formControlName="OVRDIND" [Name]="'OVRDIND'" [Label]="'Override Flag'" [isControlDisable]="this.readOnly">
                  </nfs-checkbox>
                <nfs-dropdown [Label]="'Override Rejected By'" [Name]="'OVRDRJTDBY'" [controlPlaceholder]="'Select Some Values'"
                  [Ismultiselect]="false" [EnableFilter]="true" [FilterControlPlaceholder]="'Find Some Values...'" [DataArray]="this.overrideByArray"
                  [noSearchEntriesFoundLabel]="'No Matching Values'" formControlName="OVRDRJTDBY"[isControlDisable]="!this.DeclineRequestForm.controls.OVRDIND.value || this.readOnly"></nfs-dropdown>
            </div>
            <div class="col-md-12 top15 top30">
                <nfs-textarea class="cancelTextArea" [maxLength]="1500" [Placeholder]="'Reason'" [Label]= "this.commentsLable"
                    formControlName="CANCELLATIONCOMMENT" [isControlDisable]="this.readOnly">
                </nfs-textarea>
            </div>
            <div class="col-md-12 searchBtns top10 top25">

                <nfs-button [text]="'Close'" [color]="'primary'" [disabled]="false" [matButton]="false"
                    [matRaisedButton]="false" [matRaisedButtonIcon]="true" (onBtnClick)="btnCancel_Click()">
                </nfs-button>
                <nfs-button [text]="'Submit'" [color]="'primary'" [disabled]="!this.enableButton || this.readOnly" [matButton]="false"
                    [matRaisedButton]="false" [matRaisedButtonIcon]="true" (onBtnClick)="btnSubmit_Click()">
                </nfs-button>
            </div>
        </div>
    </div>
</div>
