        <div class="row noMargin top15" [formGroup]="Tax">

            </div>
            <div class="col-md-3 top1 customTop8">

            </div>
            <div class="col-md-3 top15 customTop8">
                <nfs-currency [maxLength]="100" [Placeholder]="'Recipient Amount'" [Label]="'Recipient Amount'" formControlName="CommissionAmount" [isControlDisable]=true>

            <div class="col-md-3 top15 top10">

            </div>
            <div class="col-md-3 top15 top10">
                <nfs-currency [maxLength]="100" [Placeholder]="'Tax Exclusive Amount'" [Label]="'Tax Exclusive Amount'" formControlName="TaxExclusiveAmount" [isControlDisable]=true>
                </nfs-currency>
            </div>
        </div>
