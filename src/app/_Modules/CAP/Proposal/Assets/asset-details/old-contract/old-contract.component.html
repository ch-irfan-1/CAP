<div class="row popupHeader">
    <div class="col-md-11">
      <span class="popupMainHeading">Old Contract ET Amount Component</span>
    </div>
    <div class="col-md-1">
      <button mat-icon-button class="close-button" [mat-dialog-close]="true">
        <mat-icon class="close-icon" color="warn">close</mat-icon>
      </button>
    </div>
  </div>
  <div class="popupBody">
    <div class="row bodyContainer FormMain customAccordianMain" style="margin-bottom: 15px;">
      
      <div class="col-md-6 noPadding topMargin20">
        <mat-accordion>
          <mat-expansion-panel (opened)="panelOpenState = true" (closed)="panelOpenState = false" expanded="true">
              <mat-expansion-panel-header>
                  <mat-panel-title>
                      FINANCED
                  </mat-panel-title>
              </mat-expansion-panel-header>
              <div class="tableMain top10 rentalDetail" style="padding: 0;">
                <nfs-static-grid [inputArr]="this.addedComponent" [isRadioBtnRequired]="false"
              [radioPropertyName]="'DEFAULTIND'" [columns]="columns" [Mode]="Mode" [Labels]="labels" [pipes]="pipes"
              [IsActionRequired]="false"></nfs-static-grid>
              </div>
          </mat-expansion-panel>
      </mat-accordion>
    </div>

    <div class="col-md-6 noPadding topMargin20">

      <mat-accordion>
        <mat-expansion-panel (opened)="panelOpenState = true" (closed)="panelOpenState = false" expanded="true">
            <mat-expansion-panel-header>
                <mat-panel-title>
                  UPFRONT
                </mat-panel-title>
            </mat-expansion-panel-header>
            <div class="tableMain top10 rentalDetail" style="padding: 0;">
              <nfs-static-grid [inputArr]="this.deductedComponent" [isRadioBtnRequired]="false"
              [radioPropertyName]="'DEFAULTIND'" [columns]="columns" [Mode]="Mode" [Labels]="labels" [pipes]="pipes"
              [IsActionRequired]="false"></nfs-static-grid>
            </div>
        </mat-expansion-panel>
    </mat-accordion>
  </div>
  <div class="col-md-6 noPadding topMargin20">
    <mat-accordion>
        <mat-expansion-panel (opened)="panelOpenState = true" (closed)="panelOpenState = false" expanded="true">
            <mat-expansion-panel-header>
                <mat-panel-title>
                    WAIVED
                </mat-panel-title>
            </mat-expansion-panel-header>
            <div class="tableMain top10 rentalDetail" style="padding: 0;">
              <nfs-static-grid [inputArr]="this.waivedComponent" [isRadioBtnRequired]="false"
            [radioPropertyName]="'DEFAULTIND'" [columns]="columns" [Mode]="Mode" [Labels]="labels" [pipes]="pipes"
            [IsActionRequired]="false"></nfs-static-grid>
            </div>
        </mat-expansion-panel>
    </mat-accordion>
</div>
    </div>



  </div>
