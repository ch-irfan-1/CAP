<div class="row popupHeader">
    <div class="col-md-11">
        <span class="popupMainHeading">BBN Charge Tax Detail</span>
    </div>
    <div class="col-md-1">
        <button mat-icon-button class="close-button" [mat-dialog-close]="true">
            <mat-icon class="close-icon" color="warn">close</mat-icon>
        </button>
    </div>
</div>
<div class="popupBody">
    <div class="row bodyContainer fieldContainer customAccordianMain" [formGroup]="PRPLARTICLECOMPONENTENTITYCOL" style="margin-top: 8px !important;">

      <ng-container [formGroup]="PRPLARTEAMNTTRAN">
        <div class="col-md-3 top1 customTop8">
            <nfs-textbox [maxLength]="100" [Placeholder]="'Component Name'" [Label]="'Component Name'"
              formControlName="AMTCOMPONENTDESC" [isControlDisable]=true>
            </nfs-textbox>
        </div>

        <div class="col-md-3 top15 customTop8">
            <nfs-currency [maxLength]="100" [Placeholder]="'Component Amount'" [Label]="'Component Amount'"
              formControlName="INPUTAMT" [isControlDisable]=true>
            </nfs-currency>
        </div>
      </ng-container>

        <div class="col-md-3 top15 customTop8">
            <nfs-currency [maxLength]="100" [Placeholder]="'Tax Inclusive Amount'" [Label]="'Tax Inclusive Amount'"
              formControlName="TAXINCULSIVEAMT" [isControlDisable]=true>
            </nfs-currency>
        </div>
        <div class="col-md-3 top15 customTop8">
            <nfs-currency [maxLength]="100" [Placeholder]="'Tax Exclusive Amount'" [Label]="'Tax Exclusive Amount'"
              formControlName="TAXEXCULSIVEAMT" [isControlDisable]=true>
            </nfs-currency>
        </div>
        <div class="col-md-12 noPadding" style="margin-top: 20px !important;">
            <mat-accordion>
                <mat-expansion-panel (opened)="panelOpenState = true" (closed)="panelOpenState = false" expanded="true">
                    <mat-expansion-panel-header>
                        <mat-panel-title class="SubHeading">
                            Tax Details
                        </mat-panel-title>
                    </mat-expansion-panel-header>
                    <div class="tableMain rentalDetail">
                        <nfs-static-grid [inputArr]="doctDataset" [isRadioBtnRequired]="false" [IsActionRequired]="false"
                            [radioPropertyName]="'DEFAULTIND'" [columns]="columns" [Labels]="Labels" [pipes]="pipes"></nfs-static-grid>
                    </div>
                    <div class="">
                        <mat-paginator [selectConfig]="paginatorSelectConfig" [length]="dataSourcelength" [pageSize]="selectedPageSize"
                            [pageSizeOptions]="pageSizeOptions" (page)="PageSelectionChanged($event)">
                        </mat-paginator>
                    </div>
                </mat-expansion-panel>
            </mat-accordion>

            <div class="TabInnerMainForm">

        </div>
    </div>
</div>
