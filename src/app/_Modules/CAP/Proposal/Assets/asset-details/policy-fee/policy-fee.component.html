<div class="row popupHeader">
    <div class="col-md-11">
        <span class="popupMainHeading">Policy Fee Tax Detail</span>
    </div>
    <div class="col-md-1">
        <button mat-icon-button class="close-button" [mat-dialog-close]="true">
            <mat-icon class="close-icon" color="warn">close</mat-icon>
        </button>
    </div>
</div>
<div class="popupBody">
    <div class="row bodyContainer fieldContainer customAccordianMain">
        <ng-container [formGroup]="this.SelectedArticleComponent.controls.PRPLARTEAMNTTRAN">
            <div class="col-md-3 top15">
                <nfs-textbox [isControlDisable]="true" [maxLength]="100" [Placeholder]="'Component Name'" [Label]="'Component Name'"
                    formControlName="AMTCOMPONENTDESC">
                </nfs-textbox>
            </div>
            <div class="col-md-3 top15">
                <nfs-currency [isControlDisable]="true" [Placeholder]="'Component Amount'" [Label]="'Component Amount'"
                    formControlName="ORIGNALINPUTAMT">
                </nfs-currency>
            </div>
        </ng-container>
        <ng-container [formGroup]="this.SelectedArticleComponent">
            <div class="col-md-3 top15">
                <nfs-currency [isControlDisable]="true" [Placeholder]="'Tax Inclusive Amount'" [Label]="'Tax Inclusive Amount'"
                    formControlName="TAXINCULSIVEAMT">
                </nfs-currency>
            </div>
            <div class="col-md-3 top15">
                <nfs-currency [isControlDisable]="true" [Placeholder]="'Tax Exclusive Amount'" [Label]="'Tax Exclusive Amount'"
                    formControlName="TAXEXCULSIVEAMT">
                </nfs-currency>
            </div>
        </ng-container>
        <div class="col-md-12 noPadding">
            <mat-accordion>
                <mat-expansion-panel [expanded]="true">
                    <mat-expansion-panel-header>
                        <mat-panel-title class="SubHeading">
                            Tax Details
                        </mat-panel-title>
                    </mat-expansion-panel-header>
                    <div class="tableMain rentalDetail" style="margin-top: 10px;">
                        <nfs-static-grid [inputArr]="doctDataset" [isRadioBtnRequired]="false" [IsActionRequired]="false"
                            [radioPropertyName]="'DEFAULTIND'" [columns]="columns" [Labels]="Labels" [pipes]="pipes"></nfs-static-grid>
                    </div>
                    <!-- <div class="">
                        <mat-paginator [length]="dataSourcelength" [pageSize]="selectedPageSize"
                            [pageSizeOptions]="pageSizeOptions" (page)="PageSelectionChanged($event)">
                        </mat-paginator>
                    </div> -->
                </mat-expansion-panel>
            </mat-accordion>

    </div>
</div>
