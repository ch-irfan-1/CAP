<div class="row popupHeader">
    <div class="col-md-11">
        <span class="popupMainHeading">RV Subsidy by factory</span>
    </div>
    <div class="col-md-1">
        <button mat-icon-button class="close-button" [mat-dialog-close]="true">
            <mat-icon class="close-icon" color="warn">close</mat-icon>
        </button>
    </div>
</div>
<div class="popupBody">
    <div class="row bodyContainer fieldContainer customAccordianMain">
        <div class="col-md-12 noPadding">
            <mat-accordion  [formGroup]="this.PROPOSALFINANCIALAGREEMENT">
                <mat-expansion-panel (opened)="panelOpenState = true" (closed)="panelOpenState = false" expanded="true">
                    <mat-expansion-panel-header>
                        <mat-panel-title>
                            Application Asset Financial Detail
                        </mat-panel-title>
                    </mat-expansion-panel-header>
                    <div class="row fieldContainer">
                        <div class="col-md-3 top15 customTop11">
                            <!-- <nfs-textbox [maxLength]="100" [Placeholder]="'Total Cost'" [Label]="'Total Cost'">
                            </nfs-textbox> -->
                            <nfs-currency [Placeholder]="'Total Cost'" [Label]="'Total Cost'" formControlName="TOTALCOST"
                            [Name]="'TOTALCOST'" [Component]="'Assets'" [isControlDisable]=true>
                        </nfs-currency>
                        </div>
                        <div class="col-md-3 top15 customTop11">
                            <!-- <nfs-textbox [maxLength]="100" [Placeholder]="'Net Financed Amount'" [Label]="'Net Financed Amount'">
                            </nfs-textbox> -->
                            <nfs-currency [Placeholder]="'Net Financed Amount'" [Label]="'Net Financed Amount'"
                            formControlName="ADJUSTEDFINANCEDAMT" [Name]="'ADJUSTEDFINANCEDAMT'" [Component]="'Assets'" [isControlDisable]=true>
                        </nfs-currency>
                        </div>
                        <div class="col-md-3 top15 customTop11">
                            <nfs-currency [maxLength]="100" [Placeholder]="'Down Payment'" [Label]="'Down Payment'" [isControlDisable]=true
                            formControlName="CASHDEPOSITAMT" >
                            </nfs-currency>
                        </div>
                        <div class="col-md-3 top15 customTop11">
                            <!-- <nfs-textbox  [maxLength]="100" [Placeholder]="'Net Financed Amount (%)'" [Label]="'Net Financed Amount (%)'" >
                            </nfs-textbox> -->
                            <nfs-currency [Placeholder]="'Net Financed Amount (%)'" [Label]="'Net Financed Amount (%)'"
                            formControlName="FINANNCEDPCT" [Name]="'FINANNCEDPCT'" [Component]="'Assets'" [isControlDisable]=true>
                        </nfs-currency>
                        </div>
                    </div>
                </mat-expansion-panel>
            </mat-accordion>
