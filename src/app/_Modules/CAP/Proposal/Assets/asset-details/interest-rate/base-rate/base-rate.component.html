<div class="row popupHeader">
    <div class="col-md-11">
        <span class="popupMainHeading">Interest Base Rate Detail</span>
    </div>
    <div class="col-md-1">
        <button mat-icon-button class="close-button" [mat-dialog-close]="true">
            <mat-icon class="close-icon" color="warn">close</mat-icon>
        </button>
    </div>
</div>
<div class="popupBody">
    <div class="row bodyContainer fieldContainer">
        <div class="col-md-12 tableMain rentalDetail">
            <nfs-static-grid [inputArr]="baseRateEntity" [isRadioBtnRequired]="false"
                [IsActionRequired]=false [IsDeleteRequired]=false [pipes]="pipes"
                [radioPropertyName]="'DEFAULTIND'" [columns]="columns" [Labels]="Labels"></nfs-static-grid>
    
        </div>
    </div>
</div>
