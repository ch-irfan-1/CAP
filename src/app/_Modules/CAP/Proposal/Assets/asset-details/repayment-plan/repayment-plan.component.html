<div class="row popupHeader">
    <div class="col-md-11">
        <span class="popupMainHeading">Repayment Plan</span>
    </div>
    <div class="col-md-1">
        <button mat-icon-button class="close-button" [mat-dialog-close]="true">
            <mat-icon class="close-icon" color="warn">close</mat-icon>
        </button>
    </div>
</div>
<div class="popupBody">
    <div class="row">
        <div class="">
            <div class="card">
                <div class="tableMain customTop15 rentalDetail">
                    <div class="col-md-12 botmMargin30 noPaddingRight" style="margin-top: 15px !important;">
                        <nfs-static-grid [inputArr]="this.dataSource" [isRadioBtnRequired]="false"
                            [columns]="RPColumns" [Labels]="RPLabel" [pipes]="Pipes"
                            [IsActionRequired]="false" [IsDeleteRequired]="false"
                            (SelectionChange)="DefaultSelectionChange($event)"></nfs-static-grid>

                        <!-- <div class="tableTotal">
                            <p>Total:
                                <span *ngFor="let ele of this.Totals; let _index = index">
                                    {{ele | currency:'':''}}
                                </span>
                            </p>
                        </div> -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
