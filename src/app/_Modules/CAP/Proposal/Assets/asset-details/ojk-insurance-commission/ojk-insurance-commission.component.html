<div class="row popupHeader">
    <div class="col-md-11">
        <span class="popupMainHeading">JP1-JP2 Recipient Commission Distribution</span>
    </div>
    <div class="col-md-1">
        <button mat-icon-button class="close-button" [mat-dialog-close]="true">
            <mat-icon class="close-icon" color="warn">close</mat-icon>
        </button>
    </div>
</div>
<div class="popupBody">
    <div class="row bodyContainer fieldContainer">
        <div class="col-md-12 noPadding">
            <div class="TabInnerMainForm">
                <div class="row noMargin ">
                    <div class="col-md-3 top15">
                        <nfs-textbox [maxLength]="100" [Placeholder]="'Commission Type'" [Label]="'Commission Type'">
                        </nfs-textbox>
                    </div>
                    <div class="col-md-3 top15">
                        <nfs-currency [maxLength]="100" [Placeholder]="'JP1 Commission Amount'" [Label]="'JP1 Commission Amount'">
                        </nfs-currency>
                    </div>
                    <div class="col-md-3 top15">
                        <nfs-currency [maxLength]="100" [Placeholder]="'JP2 Commission Amount'" [Label]="'JP2 Commission Amount'">
                        </nfs-currency>
                    </div>
                </div>
                <div class="row noMargin ">
                    <div class="col-md-12 top15 tableMain">
                        <table mat-table [dataSource]="dataSource2" class="mat-elevation-z8">
    
                            <ng-container matColumnDef="Role">
                                <th mat-header-cell *matHeaderCellDef> Role </th>
                                <td mat-cell *matCellDef="let element">
                                    <nfs-textbox  [maxLength]="100" [Placeholder]="'Role'" [Label]="''" >
                                    </nfs-textbox>
                                </td>
                            </ng-container>
                
                            <ng-container matColumnDef="Recipient">
                                <th mat-header-cell *matHeaderCellDef> Recipient </th>
                                <td mat-cell *matCellDef="let element">
                                    <nfs-dropdown [Label]="''" [controlPlaceholder]="'Recipient'" [Ismultiselect]="false"
                                        [EnableFilter]="true" [FilterControlPlaceholder]="'Find Some Values...'"
                                        [noSearchEntriesFoundLabel]="'No Matching Values'"></nfs-dropdown>
                                    <!-- <div class="iconPopup">
                                        <nfs-textbox  [maxLength]="100" [Placeholder]="'Recipient'" [Label]="''" >
                                        </nfs-textbox>
                                        <div class="iconPopupMain">
                                            <p>More</p>
                                        </div>
                                    </div> -->
                                </td>
                            </ng-container>
                
                            <ng-container matColumnDef="JP1CommissionAmount">
                                <th mat-header-cell *matHeaderCellDef> JP1 Commission Amount </th>
                                <td mat-cell *matCellDef="let element">
                                    <div class="iconPopup">
                                        <nfs-currency  [maxLength]="100" [Placeholder]="'0.00 %'" [Label]="''" >
                                        </nfs-currency>
                                        <div class="iconPopupMain">
                                            <p (click)="openJOJKJP1JP2CommissionTaxDetail()">More</p>
                                        </div>
                                    </div>
                                </td>
                            </ng-container>
    
                            <ng-container matColumnDef="BankName1">
                                <th mat-header-cell *matHeaderCellDef> Bank Name </th>
                                <td mat-cell *matCellDef="let element">
                                    <nfs-textbox  [maxLength]="100" [Placeholder]="'Bank Name'" [Label]="''" >
                                    </nfs-textbox>
                                </td>
                            </ng-container>
    
                            <ng-container matColumnDef="Account1">
                                <th mat-header-cell *matHeaderCellDef> Account # </th>
                                <td mat-cell *matCellDef="let element">
                                    <nfs-textbox  [maxLength]="100" [Placeholder]="'Account'" [Label]="''" >
                                    </nfs-textbox>
                                </td>
                            </ng-container>
                
                            <ng-container matColumnDef="JP2CommissionAmount">
                                <th mat-header-cell *matHeaderCellDef> JP2 Commission Amount </th>
                                <td mat-cell *matCellDef="let element">
                                    <div class="iconPopup">
                                        <nfs-currency  [maxLength]="100" [Placeholder]="'0.00 %'" [Label]="''" >
                                        </nfs-currency>
                                        <div class="iconPopupMain">
                                            <p (click)="openJOJKJP1JP2CommissionTaxDetail()">More</p>
                                        </div>
                                    </div>
                                </td>
                            </ng-container>
                
                            <ng-container matColumnDef="BankName2">
                                <th mat-header-cell *matHeaderCellDef> Bank Name </th>
                                <td mat-cell *matCellDef="let element">
                                    <nfs-textbox  [maxLength]="100" [Placeholder]="'Bank Name'" [Label]="''" >
                                    </nfs-textbox>
                                </td>
                            </ng-container>
    
                            <ng-container matColumnDef="Account2">
                                <th mat-header-cell *matHeaderCellDef> Account # </th>
                                <td mat-cell *matCellDef="let element">
                                    <nfs-textbox  [maxLength]="100" [Placeholder]="'Account'" [Label]="''" >
                                    </nfs-textbox>
                                </td>
                            </ng-container>
    
    
                            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                        </table>
                    </div>
                    <div class="col-md-12 searchBtns topMargin20">
                        <nfs-button [text]="'Ok'" [color]="'primary'" [disabled]="false"
                            [matButton]="false" [matRaisedButton]="false" [matRaisedButtonIcon]="true">
                        </nfs-button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
