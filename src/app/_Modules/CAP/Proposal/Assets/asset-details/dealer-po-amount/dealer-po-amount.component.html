<div class="row popupHeader">
    <div class="col-md-11">
        <span class="popupMainHeading">PO Amount Components</span>
    </div>
    <div class="col-md-1">
        <button mat-icon-button class="close-button" [mat-dialog-close]="true">
            <mat-icon class="close-icon" color="warn">close</mat-icon>
        </button>
    </div>
</div>
<div class="popupBody">
    <div class="row bodyContainer fieldContainer customAccordianMain">
        <div class="col-md-6 noPadding topMargin20">
            <mat-accordion>
                <mat-expansion-panel (opened)="panelOpenState = true" (closed)="panelOpenState = false" expanded="true">
                    <mat-expansion-panel-header>
                        <mat-panel-title>
                            Components Added
                        </mat-panel-title>
                    </mat-expansion-panel-header>
                    <div class="tableMain top10 rentalDetail" style="padding: 0;">
                        <nfs-static-grid [inputArr]="this.addedComponent" [isRadioBtnRequired]="false"
                            [ActionLabel]="'Load Contract'" [radioPropertyName]="'DEFAULTIND'" [columns]="columns"
                            [Labels]="Labels" [IsActionRequired]="false" [pipes]="pipes"></nfs-static-grid>
                    </div>
                </mat-expansion-panel>
            </mat-accordion>
