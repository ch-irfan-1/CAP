<div class="row popupHeader">
  <div class="col-md-11">
    <span class="popupMainHeading">Document</span>
  </div>
  <div class="col-md-1">
    <button mat-icon-button class="close-button" [mat-dialog-close]="true">
      <mat-icon class="close-icon" color="warn">close</mat-icon>
    </button>
  </div>
</div>

@if (useEmbedMap) {
  <iframe
    [src]="embedMapUrl"
    width="100%"
    height="400"
    style="border:0;"
    allowfullscreen
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade" class="mapContainer">
  </iframe>
}

@if (!useEmbedMap) {
  <div #mapContainer class="mapContainer"></div>
}
